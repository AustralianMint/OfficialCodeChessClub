<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tournament Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #D4A853;
    --gold2: #F0C97A;
    --bg: #0D0D0F;
    --surface: #161618;
    --card: #1E1E22;
    --border: #2A2A30;
    --text: #F0EDE8;
    --muted: #6B6872;
    --win: #3DDC84;
    --accent: #D4A853;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.5;
  }

  header {
    padding: 20px 16px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .crown {
    font-size: 22px;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold), var(--gold2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Tab bar */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Mono', monospace;
  }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* Rounds panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Round label */
  .round-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--gold);
    padding: 16px 16px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .round-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  .round-num {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    font-family: 'DM Mono', monospace;
  }

  /* Match card */
  .matches {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 12px;
  }

  .match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }

  .match:active { border-color: var(--gold); }

  .match-id {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .player {
    display: flex;
    align-items: center;
    padding: 11px 12px;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .player:first-of-type {
    border-bottom: 1px solid var(--border);
  }

  .player:active { background: rgba(212,168,83,0.06); }

  .player.winner {
    background: rgba(61,220,132,0.06);
  }

  .player.winner .player-name {
    color: var(--win);
  }

  .player.loser .player-name {
    color: var(--muted);
    text-decoration: line-through;
  }

  .seed {
    font-size: 9px;
    color: var(--muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0;
    border: 1px solid var(--border);
  }

  .player-name {
    flex: 1;
    font-size: 12px;
    letter-spacing: 0.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--muted);
    min-width: 20px;
    text-align: right;
  }

  .player.winner .score { color: var(--win); }
  .player.loser .score { color: var(--muted); }

  .win-badge {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--win);
    flex-shrink: 0;
    opacity: 0;
  }
  .player.winner .win-badge { opacity: 1; }

  /* VS divider */
  .vs-pill {
    position: absolute;
    right: 48px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 7px;
    letter-spacing: 1px;
    color: var(--muted);
    background: var(--surface);
    padding: 1px 4px;
    border-radius: 3px;
    border: 1px solid var(--border);
    pointer-events: none;
  }

  /* Status bar */
  .match-status {
    padding: 5px 12px;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--surface);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 5px;
  }

  .status-dot.live {
    background: #FF4B4B;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .status-dot.done { background: var(--win); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Champion banner */
  .champion-banner {
    margin: 16px 12px;
    padding: 20px;
    background: linear-gradient(135deg, #1A1500, #251D00, #1A1500);
    border: 1px solid var(--gold);
    border-radius: 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .champion-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(212,168,83,0.15), transparent 70%);
  }

  .champion-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .champion-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .champion-trophy {
    font-size: 40px;
    margin-bottom: 8px;
  }

  /* Bracket overview tab */
  .bracket-overview {
    padding: 12px;
    overflow-x: auto;
  }

  .bracket-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    min-width: 340px;
  }

  .b-round { display: flex; flex-direction: column; gap: 6px; justify-content: space-around; }

  .b-match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    font-size: 9px;
  }

  .b-player {
    padding: 4px 6px;
    display: flex;
    justify-content: space-between;
    gap: 4px;
  }

  .b-player:first-child { border-bottom: 1px solid var(--border); }

  .b-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted);
    max-width: 60px;
  }

  .b-player.winner .b-name { color: var(--gold); }

  .b-score { color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 12px; }
  .b-player.winner .b-score { color: var(--win); }

  .b-col-label {
    font-size: 7px;
    letter-spacing: 2px;
    color: var(--muted);
    text-align: center;
    padding-bottom: 4px;
    text-transform: uppercase;
  }

  /* Animation */
  .match {
    animation: slideUp 0.3s ease both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .match:nth-child(1) { animation-delay: 0.05s; }
  .match:nth-child(2) { animation-delay: 0.1s; }
  .match:nth-child(3) { animation-delay: 0.15s; }
  .match:nth-child(4) { animation-delay: 0.2s; }
  .match:nth-child(5) { animation-delay: 0.25s; }
  .match:nth-child(6) { animation-delay: 0.3s; }
  .match:nth-child(7) { animation-delay: 0.35s; }
  .match:nth-child(8) { animation-delay: 0.4s; }

  /* Edit name modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 20px 16px;
    width: 100%;
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .modal input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 12px;
    outline: none;
    margin-bottom: 10px;
  }

  .modal input:focus { border-color: var(--gold); }

  .modal-btns { display: flex; gap: 8px; }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
  }

  .btn-cancel { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .btn-save { background: var(--gold); color: #000; font-weight: bold; }

  /* Score buttons */
  .score-btns {
    display: flex;
    gap: 4px;
    margin: 0 12px 10px;
  }

  .score-btn {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    text-align: center;
    transition: all 0.15s;
  }

  .score-btn:active { background: var(--card); color: var(--gold); border-color: var(--gold); }
</style>
</head>
<body>

<header>
  <div class="crown">🏆</div>
  <h1>Championship</h1>
  <div class="subtitle">16 Players · Single Elimination</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('r1')">Round of 16</button>
  <button class="tab" onclick="showTab('r2')">Quarters</button>
  <button class="tab" onclick="showTab('r3')">Semis</button>
  <button class="tab" onclick="showTab('finals')">Final</button>
</div>

<div id="r1" class="panel active">
  <div class="round-label">Round of 16 <span class="round-num">01</span></div>
  <div class="matches" id="matches-r1"></div>
</div>

<div id="r2" class="panel">
  <div class="round-label">Quarterfinals <span class="round-num">02</span></div>
  <div class="matches" id="matches-r2"></div>
</div>

<div id="r3" class="panel">
  <div class="round-label">Semifinals <span class="round-num">03</span></div>
  <div class="matches" id="matches-r3"></div>
</div>

<div id="finals" class="panel">
  <div class="round-label">Grand Final <span class="round-num">04</span></div>
  <div class="matches" id="matches-final"></div>
  <div id="champion-area"></div>
</div>

<!-- Edit modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Edit Player</h3>
    <input type="text" id="modal-input" placeholder="Player name" maxlength="18">
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
const AVATARS = ['🐉','🦁','🦊','🐺','🦅','🐯','🦋','🐻','🦈','🦂','🐲','🦄','🦍','🦚','🐍','🦖'];
const COLORS  = ['#C0392B','#2980B9','#27AE60','#8E44AD','#E67E22','#16A085','#2C3E50','#C0392B','#1ABC9C','#D35400','#7F8C8D','#F39C12','#2ECC71','#E74C3C','#3498DB','#9B59B6'];

let players = [
  'Alex Storm','Blake Reed','Casey Fox','Dana Wolf',
  'Emery Cole','Finley Jay','Gray Moon','Harper Sky',
  'Indigo Ray','Jordan Lee','Kai Stone','Loren Vale',
  'Morgan West','Noel Hart','Ocean Blaze','Parker Cruz'
];

// Match structure: { p1, p2, s1, s2, winner } per match
let rounds = {
  r1: Array.from({length:8}, (_,i) => ({ p1: i*2, p2: i*2+1, s1: null, s2: null, winner: null })),
  r2: Array.from({length:4}, (_,i) => ({ p1: null, p2: null, s1: null, s2: null, winner: null })),
  r3: Array.from({length:2}, (_,i) => ({ p1: null, p2: null, s1: null, s2: null, winner: null })),
  final: [{ p1: null, p2: null, s1: null, s2: null, winner: null }],
};

let editTarget = null; // { roundKey, matchIdx, playerSlot }

// ── RENDER ─────────────────────────────────────────────
function renderRound(roundKey) {
  const container = document.getElementById('matches-' + roundKey);
  const data = rounds[roundKey];
  container.innerHTML = '';

  data.forEach((match, mi) => {
    const p1name = match.p1 !== null ? players[match.p1] : (roundKey === 'r1' ? '???' : 'TBD');
    const p2name = match.p2 !== null ? players[match.p2] : (roundKey === 'r1' ? '???' : 'TBD');
    const p1idx  = match.p1;
    const p2idx  = match.p2;

    const isDone = match.winner !== null;
    const isLive = !isDone && match.p1 !== null && match.p2 !== null;
    const statusLabel = isDone ? 'Completed' : isLive ? 'Ready' : 'Pending';
    const dotClass    = isDone ? 'done' : isLive ? 'live' : '';

    const p1win = isDone && match.winner === match.p1;
    const p2win = isDone && match.winner === match.p2;

    const avatar1 = p1idx !== null ? AVATARS[p1idx] : '?';
    const avatar2 = p2idx !== null ? AVATARS[p2idx] : '?';
    const color1  = p1idx !== null ? COLORS[p1idx]  : '#444';
    const color2  = p2idx !== null ? COLORS[p2idx]  : '#444';

    const seed1 = roundKey === 'r1' ? `#${p1idx*2+1}` : '';
    const seed2 = roundKey === 'r1' ? `#${p2idx*2+2}` : '';

    const matchNum = mi + 1 + (roundKey==='r2'?8:roundKey==='r3'?12:roundKey==='final'?14:0);

    const div = document.createElement('div');
    div.className = 'match';
    div.innerHTML = `
      <div class="match-status">
        <span><span class="status-dot ${dotClass}"></span>${statusLabel}</span>
        <span>M${matchNum}</span>
      </div>
      <div class="player ${p1win?'winner':p2win?'loser':''}"
           onclick="handlePlayerClick('${roundKey}',${mi},'p1')">
        <span class="seed">${seed1}</span>
        <div class="avatar" style="background:${color1}20;border-color:${color1}40;color:${color1}">${avatar1}</div>
        <span class="player-name">${p1name}</span>
        <span class="score">${match.s1 ?? '—'}</span>
        <span class="win-badge"></span>
      </div>
      <div class="vs-pill">VS</div>
      <div class="player ${p2win?'winner':p1win?'loser':''}"
           onclick="handlePlayerClick('${roundKey}',${mi},'p2')">
        <span class="seed">${seed2}</span>
        <div class="avatar" style="background:${color2}20;border-color:${color2}40;color:${color2}">${avatar2}</div>
        <span class="player-name">${p2name}</span>
        <span class="score">${match.s2 ?? '—'}</span>
        <span class="win-badge"></span>
      </div>
    `;
    container.appendChild(div);

    // Score buttons for ready matches
    if (isLive && !isDone) {
      const sb = document.createElement('div');
      sb.className = 'score-btns';
      sb.innerHTML = `
        <button class="score-btn" onclick="setWinner('${roundKey}',${mi},'p1')">✓ ${p1name.split(' ')[0]} Wins</button>
        <button class="score-btn" onclick="setWinner('${roundKey}',${mi},'p2')">✓ ${p2name.split(' ')[0]} Wins</button>
      `;
      container.appendChild(sb);
    }
  });
}

function renderAll() {
  renderRound('r1');
  renderRound('r2');
  renderRound('r3');
  renderRound('final');
  renderChampion();
}

function renderChampion() {
  const area = document.getElementById('champion-area');
  const match = rounds.final[0];
  if (match.winner !== null) {
    const name = players[match.winner];
    area.innerHTML = `
      <div class="champion-banner">
        <div class="champion-trophy">🏆</div>
        <div class="champion-label">Champion</div>
        <div class="champion-name">${name}</div>
      </div>
    `;
  } else {
    area.innerHTML = '';
  }
}

// ── LOGIC ──────────────────────────────────────────────
function setWinner(roundKey, matchIdx, slot) {
  const match = rounds[roundKey][matchIdx];
  const winnerPlayerIdx = match[slot];
  if (winnerPlayerIdx === null) return;

  const otherScore = slot === 'p1' ? 's2' : 's1';
  const winScore   = slot === 'p1' ? 's1' : 's2';
  match.winner = winnerPlayerIdx;
  match[winScore] = Math.floor(Math.random()*3)+9;
  match[otherScore]= Math.floor(Math.random()*7);

  // Advance to next round
  const nextRoundMap = { r1: 'r2', r2: 'r3', r3: 'final' };
  const nextRound = nextRoundMap[roundKey];
  if (nextRound) {
    const nextMatchIdx = Math.floor(matchIdx / 2);
    const nextSlot = matchIdx % 2 === 0 ? 'p1' : 'p2';
    rounds[nextRound][nextMatchIdx][nextSlot] = winnerPlayerIdx;
  }

  renderAll();
}

// ── EDIT NAMES ─────────────────────────────────────────
function handlePlayerClick(roundKey, matchIdx, slot) {
  if (roundKey !== 'r1') return;
  const match = rounds[roundKey][matchIdx];
  const pIdx = match[slot];
  if (pIdx === null) return;
  editTarget = { playerIdx: pIdx };
  document.getElementById('modal-input').value = players[pIdx];
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editTarget = null;
}

function saveModal() {
  if (!editTarget) return;
  const val = document.getElementById('modal-input').value.trim();
  if (val) players[editTarget.playerIdx] = val;
  closeModal();
  renderAll();
}

// Close modal on bg click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── TABS ───────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// Init
renderAll();
</script>
</body>
</html>
