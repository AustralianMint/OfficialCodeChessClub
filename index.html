<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tournament Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #D4A853;
    --gold2: #F0C97A;
    --bg: #0D0D0F;
    --surface: #161618;
    --card: #1E1E22;
    --border: #2A2A30;
    --text: #F0EDE8;
    --muted: #6B6872;
    --win: #3DDC84;
    --accent: #D4A853;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.5;
  }

  header {
    padding: 20px 16px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .crown {
    font-size: 22px;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold), var(--gold2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Mono', monospace;
  }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .round-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--gold);
    padding: 16px 16px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .round-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  .round-num {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    font-family: 'DM Mono', monospace;
  }

  .matches {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 12px;
  }

  .match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
    animation: slideUp 0.3s ease both;
  }

  .match:active { border-color: var(--gold); }

  .player {
    display: flex;
    align-items: center;
    padding: 11px 12px;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .player:first-of-type {
    border-bottom: 1px solid var(--border);
  }

  .player:active { background: rgba(212,168,83,0.06); }

  .player.winner {
    background: rgba(61,220,132,0.06);
  }

  .player.winner .player-name {
    color: var(--win);
  }

  .player.loser .player-name {
    color: var(--muted);
    text-decoration: line-through;
  }

  .seed {
    font-size: 9px;
    color: var(--muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0;
    border: 1px solid var(--border);
  }

  .player-name {
    flex: 1;
    font-size: 12px;
    letter-spacing: 0.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--muted);
    min-width: 20px;
    text-align: right;
  }

  .player.winner .score { color: var(--win); }
  .player.loser .score { color: var(--muted); }

  .win-badge {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--win);
    flex-shrink: 0;
    opacity: 0;
  }
  .player.winner .win-badge { opacity: 1; }

  .vs-pill {
    position: absolute;
    right: 48px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 7px;
    letter-spacing: 1px;
    color: var(--muted);
    background: var(--surface);
    padding: 1px 4px;
    border-radius: 3px;
    border: 1px solid var(--border);
    pointer-events: none;
  }

  .match-status {
    padding: 5px 12px;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--surface);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 5px;
  }

  .status-dot.live {
    background: #FF4B4B;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .status-dot.done { background: var(--win); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .champion-banner {
    margin: 16px 12px;
    padding: 20px;
    background: linear-gradient(135deg, #1A1500, #251D00, #1A1500);
    border: 1px solid var(--gold);
    border-radius: 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .champion-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(212,168,83,0.15), transparent 70%);
  }

  .champion-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .champion-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .champion-trophy {
    font-size: 40px;
    margin-bottom: 8px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .match:nth-child(1) { animation-delay: 0.05s; }
  .match:nth-child(2) { animation-delay: 0.1s; }
  .match:nth-child(3) { animation-delay: 0.15s; }
  .match:nth-child(4) { animation-delay: 0.2s; }
  .match:nth-child(5) { animation-delay: 0.25s; }
  .match:nth-child(6) { animation-delay: 0.3s; }
  .match:nth-child(7) { animation-delay: 0.35s; }
  .match:nth-child(8) { animation-delay: 0.4s; }

  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 20px 16px;
    width: 100%;
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .modal input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 12px;
    outline: none;
    margin-bottom: 10px;
  }

  .modal input:focus { border-color: var(--gold); }

  .modal-btns { display: flex; gap: 8px; }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
  }

  .btn-cancel { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .btn-save { background: var(--gold); color: #000; font-weight: bold; }

  .score-btns {
    display: flex;
    gap: 4px;
    margin: 0 12px 10px;
  }

  .score-btn {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    text-align: center;
    transition: all 0.15s;
  }

  .score-btn:active { background: var(--card); color: var(--gold); border-color: var(--gold); }
</style>
</head>
<body>

<header>
  <div class="crown">🏆</div>
  <h1 id="page-title">Championship</h1>
  <div class="subtitle" id="page-subtitle">16 Players · Single Elimination</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('r1', this)">Round of 16</button>
  <button class="tab" onclick="showTab('r2', this)">Quarters</button>
  <button class="tab" onclick="showTab('r3', this)">Semis</button>
  <button class="tab" onclick="showTab('finals', this)">Final</button>
</div>

<div id="r1" class="panel active">
  <div class="round-label">Round of 16 <span class="round-num">01</span></div>
  <div class="matches" id="matches-r1"></div>
</div>

<div id="r2" class="panel">
  <div class="round-label">Quarterfinals <span class="round-num">02</span></div>
  <div class="matches" id="matches-r2"></div>
</div>

<div id="r3" class="panel">
  <div class="round-label">Semifinals <span class="round-num">03</span></div>
  <div class="matches" id="matches-r3"></div>
</div>

<div id="finals" class="panel">
  <div class="round-label">Grand Final <span class="round-num">04</span></div>
  <div class="matches" id="matches-final"></div>
  <div id="champion-area"></div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Edit Player</h3>
    <input type="text" id="modal-input" placeholder="Player name" maxlength="18">
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script type="module" src="/src/bracket-standalone.js"></script>
</body>
</html>
